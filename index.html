<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Fronton Marker</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090d10;
      --panel: #12181d;
      --panel-2: #182129;
      --line: #34424d;
      --text: #f5f8fa;
      --muted: #9fb0bc;
      --accent: #39d98a;
      --serve: #58b7e8;
      --end: #f4c95d;
      --trash: #f25f5c;
      --paddle: #b968ff;
      --hit: #6ee7f9;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body { display: flex; justify-content: center; }

    main {
      width: min(100vw, 1180px);
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      padding: max(10px, env(safe-area-inset-top)) 10px max(10px, env(safe-area-inset-bottom));
    }

    button, input, textarea { font: inherit; }

    button {
      border: 0;
      border-radius: 8px;
      min-height: 42px;
      padding: 0 11px;
      background: var(--panel-2);
      color: var(--text);
      touch-action: manipulation;
      font-weight: 650;
    }

    button:active { transform: translateY(1px); }
    button[disabled] { opacity: .45; }

    .ghost {
      border: 1px solid var(--line);
      background: transparent;
      color: #c8d8e2;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: center;
    }

    input[type="url"] {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      padding: 10px 12px;
      outline: none;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
      min-height: 0;
    }

    .left, .side {
      min-height: 0;
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .side {
      display: none;
    }

    .viewer {
      position: relative;
      height: min(54dvh, 560px);
      min-height: 240px;
      overflow: hidden;
      border: 1px solid #24303a;
      border-radius: 8px;
      background: #050607;
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transform: scale(var(--zoom, 1.32));
      transform-origin: center;
      background: #050607;
    }

    .hud {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 8px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      pointer-events: none;
    }

    .pill {
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(5, 8, 10, .78);
      border: 1px solid rgba(255,255,255,.15);
      color: var(--text);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    .notice {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      padding: 20px;
      text-align: center;
      background: rgba(5, 8, 10, .74);
      color: #dce8ee;
    }

    .notice.show { display: grid; }
    .notice strong { display: block; margin-bottom: 8px; color: var(--text); }

    .timeline {
      position: relative;
      height: 54px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      touch-action: none;
    }

    .timeline-tools {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .timeline-tools input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .progress {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      background: linear-gradient(90deg, rgba(57,217,138,.22), rgba(57,217,138,.04));
      pointer-events: none;
    }

    .scene-band {
      position: absolute;
      top: 8px;
      height: 10px;
      border-radius: 999px;
      background: rgba(57,217,138,.38);
      border: 1px solid rgba(57,217,138,.75);
    }

    .playhead {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      left: 0%;
      background: var(--accent);
      pointer-events: none;
    }

    .mark {
      position: absolute;
      top: 25px;
      width: var(--this-mark-size, var(--mark-size, 7px));
      height: calc(var(--this-mark-size, var(--mark-size, 7px)) + 8px);
      margin-left: calc(var(--this-mark-size, var(--mark-size, 7px)) / -2);
      border: 1px solid rgba(255,255,255,.72);
      border-radius: 999px;
      box-shadow: 0 0 0 1px rgba(0,0,0,.35);
    }

    .mark.selected {
      width: calc(var(--this-mark-size, var(--mark-size, 7px)) + 4px);
      height: calc(var(--this-mark-size, var(--mark-size, 7px)) + 10px);
      margin-left: calc((var(--this-mark-size, var(--mark-size, 7px)) + 4px) / -2);
      border-color: #fff;
      box-shadow: 0 0 0 2px rgba(57,217,138,.55), 0 0 12px rgba(57,217,138,.8);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
    }

    .serve { background: var(--serve); color: #071018; }
    .end { background: var(--end); color: #171107; }
    .trash { background: var(--trash); }
    .paddle { background: var(--paddle); }
    .hit { background: var(--hit); color: #061014; }

    .mark.serve { background: var(--serve); }
    .mark.end { background: var(--end); }
    .mark.trash { background: var(--trash); }
    .mark.paddle { background: var(--paddle); }
    .mark.hit { background: var(--hit); }

    .transport {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
    }

    .transport button, .controls button, .footer button {
      min-width: 0;
      white-space: nowrap;
    }

    .controls button {
      min-height: 34px;
      padding: 0 8px;
      font-size: 13px;
    }

    .transport button {
      min-height: 30px;
      padding: 0 7px;
      font-size: 13px;
    }

    .panel {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .panel-title { font-weight: 750; }
    .panel-small { color: var(--muted); font-size: 13px; }

    .scene-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .list {
      max-height: 38dvh;
      overflow: auto;
    }

    .row {
      display: grid;
      grid-template-columns: 76px minmax(0, 1fr) auto;
      gap: 6px;
      align-items: center;
      padding: 7px 8px;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }

    .row:last-child { border-bottom: 0; }
    .row.active { background: rgba(57,217,138,.10); }
    .mark-row.selected { background: rgba(57,217,138,.16); }
    .mark-row {
      grid-template-columns: 76px minmax(0, 1fr) 78px;
      align-items: start;
    }
    .time { color: var(--muted); font-variant-numeric: tabular-nums; }
    .time-cell {
      display: grid;
      gap: 4px;
      align-content: start;
    }
    .time-cell .reset-btn {
      min-height: 24px;
      padding: 0 5px;
      font-size: 10px;
    }
    .tag { font-weight: 750; overflow: hidden; text-overflow: ellipsis; }
    .serve-text { color: var(--serve); }
    .end-text { color: var(--end); }
    .trash-text { color: var(--trash); }
    .paddle-text { color: var(--paddle); }
    .hit-text { color: var(--hit); }

    .footer {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .status {
      min-height: 18px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .type-tools {
      grid-column: 2 / -1;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 4px;
      margin-top: -2px;
    }

    .type-tools button {
      min-height: 22px;
      padding: 0 4px;
      font-size: 10px;
    }

    .mark-adjust {
      grid-column: 2 / -1;
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap: 4px;
    }

    .mark-adjust button {
      min-height: 22px;
      padding: 0 3px;
      font-size: 10px;
    }

    .mark-adjust .now-btn { grid-column: span 2; }

    .type-tools .serve { background: var(--serve); color: #071018; }
    .type-tools .hit { background: var(--hit); color: #061014; }
    .type-tools .end { background: var(--end); color: #171107; }
    .type-tools .trash { background: var(--trash); color: var(--text); }
    .type-tools .paddle { background: var(--paddle); color: var(--text); }

    .drawer {
      position: fixed;
      inset: auto 0 0;
      display: none;
      max-height: 72dvh;
      z-index: 10;
      padding: 12px;
      border-top: 1px solid var(--line);
      background: #10161b;
      gap: 10px;
    }

    .drawer.open { display: grid; }

    textarea {
      width: 100%;
      min-height: 220px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #06090b;
      color: var(--text);
      padding: 10px;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 12px;
    }

    @media (max-width: 820px) {
      main {
        gap: 8px;
        padding-left: 8px;
        padding-right: 8px;
        padding-bottom: calc(112px + env(safe-area-inset-bottom));
      }
      .topbar { grid-template-columns: 1fr auto; }
      #openDriveBtn { display: none; }
      .workspace {
        display: grid;
        grid-template-columns: 1fr;
      }
      .left { display: contents; }
      .viewer {
        order: 1;
        height: 36dvh;
        min-height: 190px;
      }
      .timeline { order: 2; height: 46px; }
      .timeline-tools { order: 2; }
      .controls {
        order: 3;
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }
      .controls button {
        min-height: 30px;
        padding: 0 4px;
        font-size: 11px;
      }
      .side {
        order: 4;
        z-index: 5;
      }
      .scenes-panel .panel-head { padding: 8px 10px; }
      .scenes-panel .panel-title { font-size: 14px; }
      .scene-actions {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        padding: 8px;
        gap: 6px;
      }
      .scene-actions button {
        min-height: 40px;
        padding: 0 7px;
        font-size: 13px;
      }
      .side .list { max-height: 96px; }
      .transport {
        order: 5;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 4px;
      }
      .transport button {
        min-height: 28px;
        padding: 0 3px;
        font-size: 10px;
      }
      .marks-panel { order: 6; }
      .marks-panel .panel-head { padding: 8px 10px; }
      .marks-panel .list { max-height: 408px; }
      .mark-row {
        grid-template-columns: 58px minmax(0, 1fr) 62px;
        padding: 6px;
      }
      .type-tools, .mark-adjust { gap: 4px; }
      .type-tools button, .mark-adjust button {
        min-height: 20px;
        font-size: 9px;
      }
      .mark-adjust {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }
      .footer {
        position: fixed;
        left: 8px;
        right: 8px;
        bottom: env(safe-area-inset-bottom);
        z-index: 6;
        padding: 8px 0;
        background: var(--bg);
      }
      .footer button {
        min-height: 40px;
        padding: 0 7px;
        font-size: 13px;
      }
    }

    @media (orientation: landscape) and (max-height: 540px) {
      .workspace { grid-template-columns: minmax(0, 1fr) 300px; }
      .viewer { height: calc(100dvh - 184px); min-height: 210px; }
      .list { max-height: calc(100dvh - 220px); }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <input id="videoUrl" type="url" placeholder="Pega link de Drive o URL del proxy">
      <button id="loadBtn" class="ghost">Cargar</button>
      <button id="fileBtn" class="ghost">Archivo</button>
      <input id="fileInput" type="file" accept="video/*" hidden>
    </div>

    <section class="workspace">
      <div class="left">
        <div class="viewer">
          <video id="video" playsinline controls preload="metadata"></video>
          <div id="notice" class="notice">
            <div>
              <strong>El video aun no esta cargando.</strong>
              Si Drive se queda en gris, toca Archivo y elige el MP4 descargado en tu celular. Las marcas funcionan igual.
            </div>
          </div>
          <div class="hud">
            <span id="clock" class="pill">00:00.0 / 00:00.0</span>
            <span id="count" class="pill">0 marcas</span>
          </div>
        </div>

        <div id="timeline" class="timeline" aria-label="Linea de tiempo">
          <div id="progress" class="progress"></div>
          <div id="playhead" class="playhead"></div>
        </div>
        <div class="timeline-tools">
          <span>Todo</span>
          <input id="timelineZoom" type="range" min="1" max="8" step="1" value="1" aria-label="Zoom de linea de tiempo">
          <span id="timelineZoomLabel">x1</span>
        </div>

        <div class="controls">
          <button class="serve" data-type="serve">Saque</button>
          <button class="hit" data-type="hit">Hit</button>
          <button class="end" data-type="end">Final</button>
          <button class="trash" data-type="trash">Basura</button>
          <button class="paddle" data-type="paddle">Paleta</button>
        </div>

        <div class="transport">
          <button data-nudge="-5" class="ghost">-5s</button>
          <button data-nudge="-1" class="ghost">-1s</button>
          <button data-nudge="-0.2" class="ghost">-0.2</button>
          <button id="playPause" class="ghost">Play</button>
          <button data-nudge="0.2" class="ghost">+0.2</button>
          <button data-nudge="1" class="ghost">+1s</button>
          <button data-nudge="5" class="ghost">+5s</button>
        </div>

        <div class="panel marks-panel">
          <div class="panel-head">
            <div>
              <div class="panel-title">Marcas</div>
              <div class="panel-small">Toca una marca para ir; Borrar para quitarla.</div>
            </div>
          </div>
          <div id="marksList" class="list"></div>
        </div>
      </div>

      <aside class="side">
        <div class="panel scenes-panel">
          <div class="panel-head">
            <div>
              <div class="panel-title">Escenas</div>
              <div id="sceneHint" class="panel-small">Saque -> Final crea una escena.</div>
            </div>
          </div>
          <div class="scene-actions">
            <button id="prevScene" class="ghost">Anterior</button>
            <button id="nextScene" class="ghost">Siguiente</button>
            <button id="addScene" class="ghost">Nueva escena</button>
            <button id="playScene" class="ghost">Ver escena</button>
          </div>
          <div id="sceneList" class="list"></div>
        </div>
      </aside>
    </section>

    <div class="footer">
      <button id="undoBtn" class="ghost">Deshacer</button>
      <button id="saveBtn" class="ghost">Guardar</button>
      <button id="finalBtn" class="ghost">Final 1</button>
      <button id="jsonBtn" class="ghost">JSON</button>
      <button id="clearBtn" class="ghost">Limpiar</button>
    </div>
    <div id="saveStatus" class="status"></div>
  </main>

  <div id="drawer" class="drawer">
    <textarea id="jsonBox" spellcheck="false"></textarea>
    <button id="copyBtn">Copiar JSON</button>
    <button id="closeBtn" class="ghost">Cerrar</button>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const video = $('video');
    const videoUrl = $('videoUrl');
    const timeline = $('timeline');
    const timelineZoom = $('timelineZoom');
    const timelineZoomLabel = $('timelineZoomLabel');
    const progress = $('progress');
    const playhead = $('playhead');
    const notice = $('notice');
    const clock = $('clock');
    const count = $('count');
    const marksList = $('marksList');
    const sceneList = $('sceneList');
    const sceneHint = $('sceneHint');
    const drawer = $('drawer');
    const jsonBox = $('jsonBox');
    const storeKey = 'fronton-marker-v2';
    const labels = { serve: 'Saque', hit: 'Hit', end: 'Final', trash: 'Basura', paddle: 'Paleta' };
    const shortLabels = { serve: 'S', hit: 'H', end: 'F', trash: 'B', paddle: 'P' };
    let marks = [];
    let manualScenes = [];
    let selectedScene = -1;
    let selectedMarkId = null;
    let lastDeleted = null;

    function driveToDirect(url) {
      const text = url.trim();
      if (!text) return '';
      const idMatch = text.match(/\/d\/([^/]+)/) || text.match(/[?&]id=([^&]+)/);
      if (text.includes('drive.google.com') && idMatch) {
        return `https://drive.google.com/uc?export=download&id=${encodeURIComponent(idMatch[1])}`;
      }
      return text;
    }

    function fmt(seconds) {
      if (!Number.isFinite(seconds)) return '00:00.0';
      const m = Math.floor(seconds / 60);
      const s = seconds - m * 60;
      return `${String(m).padStart(2, '0')}:${s.toFixed(1).padStart(4, '0')}`;
    }

    function saveState() {
      localStorage.setItem(storeKey, JSON.stringify({ videoUrl: videoUrl.value, marks, manualScenes }));
    }

    function loadState() {
      const params = new URLSearchParams(location.search);
      const src = params.get('video') || params.get('v') || '';
      const initial = window.FRONTON_INITIAL || {};
      const saved = JSON.parse(localStorage.getItem(storeKey) || '{}');
      marks = Array.isArray(initial.marks) ? initial.marks : (Array.isArray(saved.marks) ? saved.marks : []);
      manualScenes = Array.isArray(initial.manualScenes) ? initial.manualScenes : (Array.isArray(initial.scenes) ? initial.scenes : (Array.isArray(saved.manualScenes) ? saved.manualScenes : []));
      videoUrl.value = src || initial.videoUrl || initial.source || saved.videoUrl || '';
      if (videoUrl.value) setVideo(videoUrl.value);
      render();
    }

    async function loadRemoteAnalysis() {
      const params = new URLSearchParams(location.search);
      const analysisUrl = params.get('analysis') || params.get('json') || '';
      if (!analysisUrl) return;
      sceneHint.textContent = 'Cargando analisis...';
      try {
        const response = await fetch(driveToDirect(analysisUrl), { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const analysis = await response.json();
        if (Array.isArray(analysis.marks)) {
          marks = analysis.marks.map((mark, index) => ({
            id: mark.id || `remote-mark-${index + 1}`,
            type: mark.type,
            time: Number(mark.time) || 0,
            originalTime: Number(mark.time) || 0,
            suggested: mark.suggested === true || String(mark.id || '').startsWith('cal-')
          }));
        }
        if (Array.isArray(analysis.scenes)) {
          manualScenes = analysis.scenes.map((scene, index) => ({
            id: scene.id || `remote-scene-${index + 1}`,
            source: scene.source || 'remote-analysis',
            start: Number(scene.start) || 0,
            end: Number(scene.end) || 0,
            tags: Array.isArray(scene.tags) ? scene.tags : [],
            suggested: scene.suggested === true || String(scene.source || '').startsWith('calibrated')
          }));
        }
        if (!videoUrl.value && analysis.video_source) {
          videoUrl.value = analysis.video_source;
          setVideo(videoUrl.value);
        }
        selectedScene = manualScenes.length ? 0 : -1;
        saveState();
        render();
      } catch (error) {
        sceneHint.textContent = 'No se pudo cargar el analisis.';
        console.error(error);
      }
    }

    function setVideo(url) {
      notice.classList.remove('show');
      video.src = driveToDirect(url);
      video.load();
      videoUrl.value = url;
      saveState();
      setTimeout(() => {
        if (!Number.isFinite(video.duration) || video.duration === 0) notice.classList.add('show');
      }, 2500);
    }

    function sortedMarks(type) {
      return marks
        .filter(mark => !type || mark.type === type)
        .slice()
        .sort((a, b) => a.time - b.time);
    }

    function derivedScenes() {
      const usable = sortedMarks().filter(mark => mark.type !== 'trash' && !mark.suggested);
      const scenes = [];
      for (const serve of usable.filter(mark => mark.type === 'serve')) {
        const end = usable.find(mark => mark.type === 'end' && mark.time > serve.time);
        if (!end) continue;
        const tags = usable
          .filter(mark => mark.time >= serve.time && mark.time <= end.time && ['hit', 'paddle'].includes(mark.type))
          .map(mark => mark.type);
        scenes.push({
          id: `auto-${serve.id}-${end.id}`,
          source: 'auto',
          start: serve.time,
          end: end.time,
          tags
        });
      }
      const confirmedManual = manualScenes.filter(scene => !scene.suggested && !String(scene.source || '').startsWith('calibrated'));
      return scenes.concat(confirmedManual).sort((a, b) => a.start - b.start);
    }

    function derivedHighlights() {
      const scenes = derivedScenes();
      const paddles = sortedMarks('paddle');
      const highlights = [];
      let last = -Infinity;
      for (const paddle of paddles) {
        if (paddle.time - last < 2.5) continue;
        last = paddle.time;
        const scene = scenes
          .filter(item => item.start <= paddle.time && item.end >= paddle.time)
          .sort((a, b) => (b.end - b.start) - (a.end - a.start))[0];
        if (!scene) continue;
        highlights.push({
          start: Number(scene.start.toFixed(3)),
          end: Number(scene.end.toFixed(3)),
          paddle_time: Number(paddle.time.toFixed(3)),
          source: 'paddle-confirmed'
        });
      }
      return highlights;
    }

    function currentPayload() {
      return {
        version: 2,
        source: videoUrl.value,
        direct_source: video.currentSrc || '',
        duration: Number.isFinite(video.duration) ? Number(video.duration.toFixed(3)) : null,
        marks: sortedMarks().map(mark => ({
          time: Number(mark.time.toFixed(3)),
          type: mark.type,
          label: labels[mark.type]
        })),
        scenes: derivedScenes().map(scene => ({
          start: Number(scene.start.toFixed(3)),
          end: Number(scene.end.toFixed(3)),
          source: scene.source,
          tags: scene.tags || []
        })),
        highlights: derivedHighlights()
      };
    }

    function addOrToggle(type) {
      const time = video.currentTime || 0;
      const hit = marks.findIndex(mark => mark.type === type && Math.abs(mark.time - time) <= 0.35);
      if (hit >= 0) {
        lastDeleted = { kind: 'mark', item: marks.splice(hit, 1)[0] };
      } else {
      marks.push({ id: crypto.randomUUID(), type, time, originalTime: time });
      }
      saveState();
      render();
    }

    function deleteMark(id) {
      const index = marks.findIndex(mark => mark.id === id);
      if (index >= 0) {
        lastDeleted = { kind: 'mark', item: marks.splice(index, 1)[0] };
        saveState();
        render();
      }
    }

    function changeMarkType(id, type) {
      const mark = marks.find(item => item.id === id);
      if (!mark) return;
      mark.type = type;
      saveState();
      render();
    }

    function adjustMarkTime(id, delta) {
      const mark = marks.find(item => item.id === id);
      if (!mark) return;
      const duration = Number.isFinite(video.duration) ? video.duration : Infinity;
      mark.time = Math.max(0, Math.min(duration, mark.time + delta));
      seek(mark.time);
      saveState();
      render();
    }

    function setMarkToNow(id) {
      const mark = marks.find(item => item.id === id);
      if (!mark) return;
      const duration = Number.isFinite(video.duration) ? video.duration : Infinity;
      mark.time = Math.max(0, Math.min(duration, video.currentTime || 0));
      seek(mark.time);
      saveState();
      render();
    }

    function resetMarkTime(id) {
      const mark = marks.find(item => item.id === id);
      if (!mark || !Number.isFinite(mark.originalTime)) return;
      mark.time = mark.originalTime;
      seek(mark.time);
      saveState();
      render();
    }

    async function submitPayload(final = false) {
      if (final && localStorage.getItem('fronton-final-pin-ok') !== '1') {
        const pin = prompt('Clave final');
        if (pin !== '1') {
          $('saveStatus').textContent = 'Final no enviado: clave incorrecta.';
          return;
        }
        localStorage.setItem('fronton-final-pin-ok', '1');
      }

      const payload = currentPayload();
      $('saveStatus').textContent = final ? 'Enviando final...' : 'Guardando...';
      try {
        const response = await fetch('/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ final, payload })
        });
        const result = await response.json();
        if (!response.ok || !result.ok) throw new Error(result.error || `HTTP ${response.status}`);
        $('saveStatus').textContent = final
          ? `Final guardado: ${result.file}`
          : `Guardado: ${result.file}`;
      } catch (error) {
        $('saveStatus').textContent = 'No se pudo guardar. Usa JSON como respaldo.';
        console.error(error);
      }
    }

    function addScene() {
      const now = video.currentTime || 0;
      const previousServe = sortedMarks('serve').filter(mark => mark.time <= now).pop();
      const nextEnd = sortedMarks('end').find(mark => mark.time >= now);
      const start = previousServe ? previousServe.time : Math.max(0, now - 8);
      const end = nextEnd ? nextEnd.time : Math.min(video.duration || now + 8, now + 8);
      manualScenes.push({ id: crypto.randomUUID(), source: 'manual', start, end, tags: ['manual'] });
      selectedScene = derivedScenes().findIndex(scene => scene.id === manualScenes[manualScenes.length - 1].id);
      saveState();
      render();
    }

    function deleteScene(id) {
      const index = manualScenes.findIndex(scene => scene.id === id);
      if (index >= 0) {
        lastDeleted = { kind: 'scene', item: manualScenes.splice(index, 1)[0] };
        selectedScene = -1;
        saveState();
        render();
      }
    }

    function seek(time) {
      if (!Number.isFinite(time)) return;
      video.currentTime = Math.max(0, Math.min(video.duration || time, time));
    }

    function timelineWindow() {
      const duration = Number.isFinite(video.duration) ? video.duration : 0;
      const zoom = Number(timelineZoom.value || 1);
      if (!duration || zoom <= 1) return { start: 0, end: duration, zoom };
      const span = duration / zoom;
      const center = Math.max(span / 2, Math.min(duration - span / 2, video.currentTime || 0));
      return { start: center - span / 2, end: center + span / 2, zoom };
    }

    function timeToPercent(time) {
      const view = timelineWindow();
      if (!view.end || view.end <= view.start) return 0;
      return ((time - view.start) / (view.end - view.start)) * 100;
    }

    function nearestMark(time) {
      const ordered = sortedMarks();
      if (!ordered.length) return null;
      return ordered.reduce((best, mark) => Math.abs(mark.time - time) < Math.abs(best.time - time) ? mark : best, ordered[0]);
    }

    function selectMark(id, shouldSeek = false) {
      selectedMarkId = id;
      const mark = marks.find(item => item.id === id);
      if (mark && shouldSeek) seek(mark.time);
      render();
      requestAnimationFrame(() => {
        const row = marksList.querySelector(`[data-mark-row="${id}"]`);
        if (row) marksList.scrollTop = Math.max(0, row.offsetTop - marksList.offsetTop);
      });
    }

    function gotoScene(index) {
      const scenes = derivedScenes();
      if (!scenes.length) return;
      selectedScene = Math.max(0, Math.min(scenes.length - 1, index));
      seek(scenes[selectedScene].start);
      render();
    }

    async function playSelectedScene() {
      const scene = derivedScenes()[selectedScene];
      if (!scene) return;
      seek(scene.start);
      await video.play();
      const stop = () => {
        if (video.currentTime >= scene.end) {
          video.pause();
          video.removeEventListener('timeupdate', stop);
        }
      };
      video.addEventListener('timeupdate', stop);
    }

    function seekRatio(clientX) {
      const rect = timeline.getBoundingClientRect();
      const ratio = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
      const view = timelineWindow();
      if (Number.isFinite(video.duration)) {
        const time = view.start + ratio * (view.end - view.start);
        seek(time);
        const mark = nearestMark(time);
        if (mark) selectMark(mark.id, false);
      }
    }

    function renderTimeline() {
      timeline.querySelectorAll('.mark,.scene-band').forEach(node => node.remove());
      if (!Number.isFinite(video.duration) || video.duration <= 0) return;
      const zoom = Number(timelineZoom.value || 1);
      const baseMarkSize = Math.min(7.5, 1.6 + zoom * 0.55);
      timeline.style.setProperty('--mark-size', `${baseMarkSize}px`);
      const visibleMarks = marks
        .map(mark => ({ mark, left: timeToPercent(mark.time) }))
        .filter(item => item.left >= -2 && item.left <= 102)
        .sort((a, b) => a.left - b.left);
      const timelineWidth = Math.max(1, timeline.clientWidth || 1);
      for (let index = 0; index < visibleMarks.length; index += 1) {
        const { mark, left } = visibleMarks[index];
        const previousGap = index > 0 ? left - visibleMarks[index - 1].left : Infinity;
        const nextGap = index < visibleMarks.length - 1 ? visibleMarks[index + 1].left - left : Infinity;
        const tightestGap = Math.min(previousGap, nextGap);
        const pixelGap = (tightestGap / 100) * timelineWidth;
        let markSize = baseMarkSize;
        if (pixelGap < 8) markSize = Math.max(1.4, baseMarkSize * 0.28);
        else if (pixelGap < 14) markSize = Math.max(1.8, baseMarkSize * 0.4);
        else if (pixelGap < 22) markSize = Math.max(2.2, baseMarkSize * 0.58);
        else if (pixelGap < 34) markSize = Math.max(2.8, baseMarkSize * 0.76);
        const node = document.createElement('button');
        node.className = `mark ${mark.type}${mark.id === selectedMarkId ? ' selected' : ''}`;
        if (mark.suggested) node.style.opacity = '0.42';
        node.style.left = `${left}%`;
        node.style.setProperty('--this-mark-size', `${markSize}px`);
        node.title = `${labels[mark.type]} ${fmt(mark.time)}`;
        node.addEventListener('click', event => {
          event.stopPropagation();
          selectMark(mark.id, true);
        });
        node.addEventListener('dblclick', event => {
          event.stopPropagation();
          deleteMark(mark.id);
        });
        timeline.appendChild(node);
      }
    }

    function renderMarks() {
      const orderedMarks = sortedMarks();
      const rows = orderedMarks.map(mark => `
        <div class="row mark-row${mark.id === selectedMarkId ? ' selected' : ''}" data-mark-row="${mark.id}">
          <div class="time-cell">
            <div class="time">${fmt(mark.time)}</div>
            <button class="ghost reset-btn" data-reset-mark="${mark.id}">Reset</button>
          </div>
          <button class="ghost tag ${mark.type}-text" data-seek="${mark.time}" data-select-mark="${mark.id}">${labels[mark.type]}</button>
          <button class="ghost" data-delete-mark="${mark.id}">Borrar</button>
          <div class="mark-adjust">
            <button class="ghost" data-adjust-mark="${mark.id}" data-adjust="-5">-5</button>
            <button class="ghost" data-adjust-mark="${mark.id}" data-adjust="-1">-1</button>
            <button class="ghost" data-adjust-mark="${mark.id}" data-adjust="-0.5">-.5</button>
            <button class="ghost" data-adjust-mark="${mark.id}" data-adjust="0.5">+.5</button>
            <button class="ghost" data-adjust-mark="${mark.id}" data-adjust="1">+1</button>
            <button class="ghost" data-adjust-mark="${mark.id}" data-adjust="5">+5</button>
            <button class="ghost now-btn" data-now-mark="${mark.id}">Ahora</button>
          </div>
          <div class="type-tools">
            ${Object.keys(labels).map(type => `<button class="${type}" data-change-mark="${mark.id}" data-change-type="${type}">${shortLabels[type]}</button>`).join('')}
          </div>
        </div>
      `).join('');
      marksList.innerHTML = rows || '<div class="row"><div class="time">--</div><div class="tag">Sin marcas todavia</div><span></span></div>';
      marksList.querySelectorAll('[data-seek]').forEach(button => button.addEventListener('click', () => selectMark(button.dataset.selectMark, true)));
      marksList.querySelectorAll('[data-delete-mark]').forEach(button => button.addEventListener('click', () => deleteMark(button.dataset.deleteMark)));
      marksList.querySelectorAll('[data-change-mark]').forEach(button => button.addEventListener('click', () => changeMarkType(button.dataset.changeMark, button.dataset.changeType)));
      marksList.querySelectorAll('[data-adjust-mark]').forEach(button => button.addEventListener('click', () => adjustMarkTime(button.dataset.adjustMark, Number(button.dataset.adjust))));
      marksList.querySelectorAll('[data-now-mark]').forEach(button => button.addEventListener('click', () => setMarkToNow(button.dataset.nowMark)));
      marksList.querySelectorAll('[data-reset-mark]').forEach(button => button.addEventListener('click', () => resetMarkTime(button.dataset.resetMark)));
    }

    function renderScenes() {
      const scenes = derivedScenes();
      sceneHint.textContent = scenes.length
        ? `Escena ${selectedScene >= 0 ? selectedScene + 1 : '-'} de ${scenes.length}`
        : 'Saque -> Final crea una escena.';
      sceneList.innerHTML = scenes.map((scene, index) => {
        const tags = (scene.tags && scene.tags.length) ? ` · ${scene.tags.join(', ')}` : '';
        const active = index === selectedScene ? ' active' : '';
        const remove = scene.source === 'manual' ? `<button class="ghost" data-delete-scene="${scene.id}">Borrar</button>` : `<button class="ghost" data-scene="${index}">Ir</button>`;
        return `
          <div class="row${active}">
            <div class="time">${fmt(scene.start)}</div>
            <button class="ghost tag" data-scene="${index}">${fmt(scene.end)}${tags}</button>
            ${remove}
          </div>
        `;
      }).join('') || '<div class="row"><div class="time">--</div><div class="tag">Marca Saque y Final</div><span></span></div>';
      sceneList.querySelectorAll('[data-scene]').forEach(button => button.addEventListener('click', () => gotoScene(Number(button.dataset.scene))));
      sceneList.querySelectorAll('[data-delete-scene]').forEach(button => button.addEventListener('click', () => deleteScene(button.dataset.deleteScene)));
      const activeRow = sceneList.querySelector('.row.active');
      if (activeRow) {
        sceneList.scrollTop = Math.max(0, activeRow.offsetTop - sceneList.offsetTop - (sceneList.clientHeight - activeRow.clientHeight) / 2);
      }
      $('prevScene').disabled = scenes.length === 0;
      $('nextScene').disabled = scenes.length === 0;
      $('playScene').disabled = selectedScene < 0 || !scenes[selectedScene];
    }

    function render() {
      count.textContent = `${marks.length} marca${marks.length === 1 ? '' : 's'}`;
      renderTimeline();
      renderMarks();
      renderScenes();
    }

    function updateClock() {
      const duration = Number.isFinite(video.duration) ? video.duration : 0;
      const ratio = duration > 0 ? video.currentTime / duration : 0;
      const zoomRatio = timeToPercent(video.currentTime);
      progress.style.width = timelineWindow().zoom <= 1 ? `${ratio * 100}%` : '0%';
      playhead.style.left = `${Math.max(0, Math.min(100, zoomRatio))}%`;
      clock.textContent = `${fmt(video.currentTime)} / ${fmt(duration)}`;
      if (timelineWindow().zoom > 1 && !dragging) renderTimeline();
      requestAnimationFrame(updateClock);
    }

    document.querySelectorAll('[data-type]').forEach(button => button.addEventListener('click', () => addOrToggle(button.dataset.type)));
    document.querySelectorAll('[data-nudge]').forEach(button => button.addEventListener('click', () => seek((video.currentTime || 0) + Number(button.dataset.nudge))));
    document.addEventListener('keydown', event => {
      if (['INPUT', 'TEXTAREA'].includes(document.activeElement?.tagName)) return;
      if (!['ArrowLeft', 'ArrowRight'].includes(event.key)) return;
      event.preventDefault();
      const amount = event.shiftKey ? 5 : (event.altKey ? 0.2 : 1);
      seek((video.currentTime || 0) + (event.key === 'ArrowRight' ? amount : -amount));
      renderTimeline();
    });
    timelineZoom.addEventListener('input', () => {
      timelineZoomLabel.textContent = `x${timelineZoom.value}`;
      renderTimeline();
    });
    $('loadBtn').addEventListener('click', () => setVideo(videoUrl.value));
    videoUrl.addEventListener('keydown', event => { if (event.key === 'Enter') setVideo(videoUrl.value); });
    $('fileBtn').addEventListener('click', () => $('fileInput').click());
    $('fileInput').addEventListener('change', () => {
      const file = $('fileInput').files && $('fileInput').files[0];
      if (!file) return;
      video.src = URL.createObjectURL(file);
      videoUrl.value = file.name;
      notice.classList.remove('show');
      saveState();
    });
    $('addScene').addEventListener('click', addScene);
    $('prevScene').addEventListener('click', () => gotoScene(selectedScene < 0 ? 0 : selectedScene - 1));
    $('nextScene').addEventListener('click', () => gotoScene(selectedScene + 1));
    $('playScene').addEventListener('click', playSelectedScene);
    $('playPause').addEventListener('click', async event => {
      if (video.paused) {
        await video.play();
        event.currentTarget.textContent = 'Pausa';
      } else {
        video.pause();
        event.currentTarget.textContent = 'Play';
      }
    });
    $('undoBtn').addEventListener('click', () => {
      if (lastDeleted?.kind === 'mark') marks.push(lastDeleted.item);
      else if (lastDeleted?.kind === 'scene') manualScenes.push(lastDeleted.item);
      else marks.pop();
      lastDeleted = null;
      saveState();
      render();
    });
    $('saveBtn').addEventListener('click', () => submitPayload(false));
    $('finalBtn').addEventListener('click', () => submitPayload(true));
    $('jsonBtn').addEventListener('click', () => {
      jsonBox.value = JSON.stringify(currentPayload(), null, 2);
      drawer.classList.add('open');
    });
    $('copyBtn').addEventListener('click', async () => {
      jsonBox.select();
      await navigator.clipboard.writeText(jsonBox.value);
    });
    $('closeBtn').addEventListener('click', () => drawer.classList.remove('open'));
    $('clearBtn').addEventListener('click', () => {
      if (confirm('Borrar todas las marcas y escenas?')) {
        marks = [];
        manualScenes = [];
        selectedScene = -1;
        lastDeleted = null;
        saveState();
        render();
      }
    });

    let dragging = false;
    timeline.addEventListener('pointerdown', event => {
      dragging = true;
      timeline.setPointerCapture(event.pointerId);
      seekRatio(event.clientX);
    });
    timeline.addEventListener('pointermove', event => { if (dragging) seekRatio(event.clientX); });
    timeline.addEventListener('pointerup', () => { dragging = false; });
    timeline.addEventListener('pointercancel', () => { dragging = false; });
    video.addEventListener('loadedmetadata', () => { notice.classList.remove('show'); render(); });
    video.addEventListener('durationchange', render);
    video.addEventListener('error', () => notice.classList.add('show'));

    loadState();
    loadRemoteAnalysis();
    requestAnimationFrame(updateClock);
  </script>
</body>
</html>
